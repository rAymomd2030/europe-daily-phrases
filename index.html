<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="瑞典語、德語、義大利語旅行日常對話、字母與數字發音小抄。"
    />
    <meta name="theme-color" content="#f5f3ed" />
    <title>Europe Daily Phrases</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><rect width=%2264%22 height=%2264%22 rx=%2216%22 fill=%22%2317201d%22/><path d=%22M32 11l4.8 16.2L53 32l-16.2 4.8L32 53l-4.8-16.2L11 32l16.2-4.8z%22 fill=%22%23f2c94c%22/></svg>"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-theme="light" data-language="swedish">
    <a class="skip-link" href="#main-content">跳到主要內容</a>

    <header class="hero">
      <nav class="topbar" aria-label="頁面工具">
        <a class="brand-mark" href="#" aria-label="回到頁首">
          <span aria-hidden="true">✦</span>
          <span>EU / 26</span>
        </a>
        <button class="icon-button theme-toggle" id="theme-toggle" type="button" aria-label="切換深色模式">
          <span class="theme-icon" aria-hidden="true">☾</span>
          <span class="theme-label">深色</span>
        </button>
      </nav>

      <div class="hero-copy">
        <p class="eyebrow">Pocket language companion · 2026</p>
        <h1>Europe Daily<br /><span>Phrases</span></h1>
        <p class="subtitle">瑞典・德國・義大利旅行日常語言小抄</p>
      </div>

      <div class="language-switcher" id="language-switcher" role="tablist" aria-label="選擇語言"></div>
    </header>

    <main id="main-content">
      <section class="tool-panel" aria-label="搜尋與語音設定">
        <label class="search-box" for="search-input">
          <span aria-hidden="true">⌕</span>
          <input
            id="search-input"
            type="search"
            inputmode="search"
            autocomplete="off"
            aria-label="搜尋語言內容"
            placeholder="搜尋中文、原文或發音提示"
          />
          <kbd id="search-shortcut">⌘ K</kbd>
        </label>

        <div class="speech-settings">
          <div class="setting-group">
            <label for="voice-select">裝置語音</label>
            <select id="voice-select" aria-describedby="voice-status">
              <option value="">正在讀取語音…</option>
            </select>
          </div>
          <div class="setting-group">
            <span class="setting-label">播放速度</span>
            <div class="speed-control" id="speed-control" role="radiogroup" aria-label="播放速度">
              <button type="button" data-rate="0.72" role="radio" aria-checked="false">慢速</button>
              <button type="button" data-rate="0.85" role="radio" aria-checked="true">正常</button>
              <button type="button" data-rate="1" role="radio" aria-checked="false">快速</button>
            </div>
          </div>
        </div>

        <p class="status-message" id="voice-status" role="status" aria-live="polite"></p>
        <aside class="voice-diagnostic" id="voice-diagnostic" aria-labelledby="voice-diagnostic-title">
          <div class="diagnostic-heading">
            <span class="diagnostic-dot" aria-hidden="true"></span>
            <h2 id="voice-diagnostic-title">語音狀態</h2>
          </div>
          <dl>
            <div><dt>目前語言</dt><dd id="diagnostic-language">—</dd></div>
            <div><dt>目標語音</dt><dd id="diagnostic-target">—</dd></div>
            <div><dt>使用 voice</dt><dd id="diagnostic-voice">—</dd></div>
            <div><dt>voice.lang</dt><dd id="diagnostic-voice-lang">—</dd></div>
            <div class="diagnostic-status"><dt>狀態</dt><dd id="diagnostic-match">正在讀取…</dd></div>
          </dl>
        </aside>
      </section>

      <section class="content-shell" aria-labelledby="section-title">
        <div class="section-heading">
          <div>
            <p class="section-kicker" id="section-kicker">SVENSKA · 瑞典語</p>
            <h2 id="section-title">隨手查，開口說。</h2>
          </div>
          <p class="result-count" id="result-count"></p>
        </div>

        <div class="content-tabs" id="content-tabs" role="tablist" aria-label="學習內容">
          <button type="button" role="tab" data-view="alphabet" aria-selected="true">
            <span aria-hidden="true">Aa</span> 字母發音
          </button>
          <button type="button" role="tab" data-view="phrases" aria-selected="false">
            <span aria-hidden="true">“ ”</span> 日常對話
          </button>
          <button type="button" role="tab" data-view="numberRules" aria-selected="false">
            <span aria-hidden="true">123</span> 數字公式
          </button>
          <button type="button" role="tab" data-view="favorites" aria-selected="false">
            <span aria-hidden="true">♥</span> 收藏
            <span class="favorite-count" id="favorite-count">0</span>
          </button>
        </div>

        <div class="category-filter is-hidden" id="category-filter" aria-label="對話分類"></div>
        <div class="content-note" id="content-note"></div>
        <div class="card-grid alphabet-grid" id="content-grid" role="tabpanel"></div>
        <div class="empty-state is-hidden" id="empty-state">
          <span aria-hidden="true">⌕</span>
          <h3>沒有找到符合的內容</h3>
          <p>換個關鍵字，或清除分類篩選再試一次。</p>
          <button type="button" class="secondary-button" id="clear-filters">清除篩選</button>
        </div>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <footer>
      <p>Made for moving through Europe <span aria-hidden="true">↗</span></p>
      <p>發音品質依裝置安裝的系統語音而異。</p>
    </footer>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
